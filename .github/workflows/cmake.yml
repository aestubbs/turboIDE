name: Build

on: [push, pull_request, workflow_dispatch]

env:
  BUILD_TYPE: MinSizeRel
  TURBO_COMMIT_SHA: ${{ github.sha }}

jobs:
  build-linux-gcc:
    name: Linux (GCC)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Install Dependencies
      run: |
        sudo apt-get -y update
        sudo apt-get -y install build-essential cmake libgtest-dev

    - name: Configure CMake
      shell: bash
      run: cmake . -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DTURBO_OPTIMIZE_BUILD=OFF -DTURBO_BUILD_EXAMPLES=ON -DTURBO_BUILD_TESTS=ON

    - name: Build
      shell: bash
      run: cmake --build . -j$(nproc)

  build-windows-msvc32:
    name: Windows (MSVC) (Win32)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Configure CMake
      shell: bash
      run: cmake . -A Win32 -DTURBO_USE_STATIC_RTL=ON

    - name: Build
      shell: bash
      run: cmake --build . --config $BUILD_TYPE -- -p:UseMultiToolTask=true -p:CL_MPcount=$(nproc)

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: turboIDE-x86
        path: |
          ${{env.BUILD_TYPE}}/turboIDE.exe

  build-windows-msvc64:
    name: Windows (MSVC) (x64)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Configure CMake
      shell: bash
      run: cmake . -A x64 -DTURBO_USE_STATIC_RTL=ON

    - name: Build
      shell: bash
      run: cmake --build . --config $BUILD_TYPE -- -p:UseMultiToolTask=true -p:CL_MPcount=$(nproc)

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: turboIDE-x64
        path: |
          ${{env.BUILD_TYPE}}/turboIDE.exe

  build-macos-clang:
    name: MacOS (Clang)
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Configure CMake
      shell: bash
      run: cmake . -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DTURBO_MINIMIZE_SIZE=ON

    - name: Build
      shell: bash
      run: cmake --build . -j$(sysctl -n hw.logicalcpu)

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: turboIDE-macos
        path: turboIDE

  # Publish the built binaries to a GitHub Release. Runs only for tag pushes
  # (e.g. `git tag v1.0.0 && git push origin v1.0.0`); regular pushes still build
  # and expose the per-run artifacts above, but cut no release. A single job
  # (rather than per-build-job steps) collects all binaries so the release is
  # created once, with no cross-job race.
  release:
    name: Release
    needs: [build-windows-msvc32, build-windows-msvc64, build-macos-clang]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v8

    - name: Stage release assets
      run: |
        mkdir -p dist
        cp turboIDE-x64/turboIDE.exe dist/turboIDE-x64.exe
        cp turboIDE-x86/turboIDE.exe dist/turboIDE-x86.exe
        cp turboIDE-macos/turboIDE   dist/turboIDE-macos-arm64

    - name: Publish GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "$GITHUB_REF_NAME" dist/* \
          --repo "$GITHUB_REPOSITORY" --title "$GITHUB_REF_NAME" --generate-notes \
        || gh release upload "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPOSITORY" --clobber

